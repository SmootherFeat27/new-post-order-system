<!DOCTYPE html>
<html>
<head>
    <title>PO Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="container mt-4">

<h2>Create Purchase Order</h2>

<!-- Vendor Dropdown -->
<select id="vendor" class="form-control mb-3"></select>

<!-- Product Table -->
<table class="table" id="productTable">
    <thead>
        <tr>
            <th>Product</th>
            <th>Quantity</th>
            <th>Price</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<button class="btn btn-secondary" onclick="addRow()">Add Product</button>
<button class="btn btn-primary" onclick="createPO()">Create PO</button>

<script>
const API = "http://127.0.0.1:8000";

// Load Vendors
fetch(`${API}/vendors/`)
.then(res => res.json())
.then(data => {
    let dropdown = document.getElementById("vendor");
    data.forEach(v => {
        dropdown.innerHTML += `<option value="${v.id}">${v.name}</option>`;
    });
});

// Load Products
let products = [];
fetch(`${API}/products/`)
.then(res => res.json())
.then(data => {
    products = data;
});

// Add Row
function addRow() {
    let row = `<tr>
        <td>
            <select class="form-control product">
                ${products.map(p => `<option value="${p.id}" data-price="${p.unit_price}">${p.name}</option>`).join("")}
            </select>
        </td>
        <td><input type="number" class="form-control qty" value="1"></td>
        <td><input type="number" class="form-control price"></td>
    </tr>`;
    document.querySelector("#productTable tbody").innerHTML += row;
}

// Create PO
function createPO() {
    let items = [];
    document.querySelectorAll("#productTable tbody tr").forEach(row => {
        let product = row.querySelector(".product");
        items.push({
            product_id: parseInt(product.value),
            quantity: parseInt(row.querySelector(".qty").value),
            price: parseFloat(row.querySelector(".price").value)
        });
    });

    let data = {
        reference_no: "PO" + Date.now(),
        vendor_id: parseInt(document.getElementById("vendor").value),
        items: items
    };

    fetch(`${API}/purchase-orders`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(res => alert("PO Created Successfully!"))
    .catch(err => console.error(err));
}
</script>

</body>
</html>
